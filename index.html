<!DOCTYPE html>
<html>
<head>
    <title>Messier Object Viewer</title>
    <link rel="icon" href="favicon.png" type="image/png">
    <style>
        :root {
            --bg: #ffffff;
            --text: #000000;
            --panel: #f5f5f5;
            --border: #ddd;
            --header: #f2f2f2;
            --button: #e0e0e0;
            --button-text: #000000;
        }
    
        [data-theme="dark"] {
            --bg: #121212;
            --text: #e0e0e0;
            --panel: #1e1e1e;
            --border: #333;
            --header: #2d2d2d;
            --button: #2d2d2d;
            --button-text: #e0e0e0;
        }
    
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            background-color: var(--bg);
            color: var(--text);
        }
    
        .container { display: flex; gap: 20px; }
        .left-panel, .right-panel {
            background-color: var(--panel);
            padding: 15px;
            border-radius: 8px;
        }
        .left-panel { width: 250px; }
        .right-panel { flex: 1; }
    
        table {
            width: 100%;
            border-collapse: collapse;
            background-color: var(--panel);
        }
        th, td {
            border: 1px solid var(--border);
            padding: 8px;
            text-align: left;
        }
        th {
            background-color: var(--header);
            cursor: pointer;
        }
        tr:nth-child(even) { background-color: #f9f9f9; }
        [data-theme="dark"] tr:nth-child(even) { background-color: #252525; }
    
        .constellation-list {
            max-height: 500px;
            overflow-y: auto;
        }
        .version {
            font-size: 0.7em;
            color: #666;
        }
        [data-theme="dark"] .version { color: #888; }
    
        button {
            background-color: var(--button);
            color: var(--button-text);
            border: 1px solid var(--border);
            padding: 5px 10px;
            border-radius: 4px;
            margin-right: 5px;
            margin-bottom: 5px;
            cursor: pointer;
        }
        [data-theme="light"] button:hover { background-color: #d0d0d0; }
        [data-theme="dark"] button:hover { background-color: #3a3a3a; }
    
        .apod-banner {
            width: 100%;
            max-height: 200px;
            object-fit: cover;
            margin-bottom: 10px;
            border-radius: 5px;
        }
        .apod-credit {
            font-size: 0.8em;
            color: #666;
            text-align: right;
            margin-top: -15px;
            margin-bottom: 10px;
        }
        [data-theme="dark"] .apod-credit { color: #888; }
        .apod-credit a {
            color: #0066cc;
            text-decoration: none;
        }
        [data-theme="dark"] .apod-credit a { color: #4dabf7; }
        .apod-credit a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <img src="https://apod.nasa.gov/apod/image/2605/messier_portrait_300px_160h.jpg" class="apod-banner" alt="Astronomy Picture of the Day">
    <p class="apod-credit">Image: <a href="https://apod.nasa.gov/apod/ap260514.html" target="_blank">NASA APOD</a></p>
    <h1>Messier Object Viewer <span class="version">v0.1.7.1</span></h1>
    <button onclick="toggleTheme()" id="themeToggle">🌙</button>
    <div class="container">
        <div class="left-panel">
            <h2>Select Constellations</h2>
            <button onclick="selectAll()">Select All</button>
            <button onclick="deselectAll()">Deselect All</button>
            <div id="constellationList" class="constellation-list"></div>
        </div>
        <div class="right-panel">
            <div>
                Sort by:
                <select id="sortBy" onchange="filterObjects()">
                    <option value="number">Messier Number</option>
                    <option value="name">Name</option>
                    <option value="type">Type</option>
                    <option value="magnitude">Magnitude</option>
                    <option value="difficulty">Difficulty</option>
                </select>
                Order:
                <select id="sortOrder" onchange="filterObjects()">
                    <option value="asc">Ascending</option>
                    <option value="desc">Descending</option>
                </select>
            </div>
            <table id="resultsTable">
                <thead>
                    <tr>
                        <th onclick="sortTable(0)">Messier #</th>
                        <th onclick="sortTable(1)">Name</th>
                        <th onclick="sortTable(2)">Type</th>
                        <th onclick="sortTable(3)">Magnitude</th>
                        <th onclick="sortTable(4)">Difficulty</th>
                        <th>Image</th>
                    </tr>
                </thead>
                <tbody id="resultsBody"></tbody>
            </table>
            <p id="status">Select constellations to see objects</p>
        </div>
    </div>

<script>
    let messierData = {};
    let constellationVars = {};

    fetch('https://angelos-th.github.io/Messier-Objects/messier.json')
        .then(response => {
            if (!response.ok) throw new Error('File not found');
            return response.json();
        })
        .then(data => {
            messierData = data.data;
            populateConstellations();
            filterObjects();
        })
        .catch(error => console.error('Error loading JSON:', error));

        function populateConstellations() {
            const constellationList = document.getElementById('constellationList');
            const constellations = [...new Set(Object.values(messierData).map(obj => obj.constellation))].sort();
            constellations.forEach(constellation => {
                constellationVars[constellation] = false;
                const div = document.createElement('div');
                const checkbox = document.createElement('input');
                checkbox.type = 'checkbox';
                checkbox.id = `const-${constellation}`;
                checkbox.onchange = filterObjects;
                const label = document.createElement('label');
                label.htmlFor = `const-${constellation}`;
                label.textContent = constellation;
                div.appendChild(checkbox);
                div.appendChild(label);
                constellationList.appendChild(div);
            });
        }

        function selectAll() {
            Object.keys(constellationVars).forEach(c => {constellationVars[c] = true;});
            document.querySelectorAll('#constellationList input[type="checkbox"]').forEach(cb => cb.checked = true);
            filterObjects();
        }

        function deselectAll() {
            Object.keys(constellationVars).forEach(c => {constellationVars[c] = false;});
            document.querySelectorAll('#constellationList input[type="checkbox"]').forEach(cb => cb.checked = false);
            filterObjects();
        }

        function filterObjects() {
            document.querySelectorAll('#constellationList input[type="checkbox"]').forEach(cb => {
                constellationVars[cb.nextElementSibling.textContent] = cb.checked;
            });
            const selectedConstellations = Object.entries(constellationVars)
                .filter(([_, checked]) => checked)
                .map(([c, _]) => c);
            let filtered = Object.entries(messierData)
                .filter(([_, obj]) => selectedConstellations.length === 0 || selectedConstellations.includes(obj.constellation));
            const sortBy = document.getElementById('sortBy').value;
            const sortOrder = document.getElementById('sortOrder').value;
            filtered.sort((a, b) => {
                const aObj = a[1], bObj = b[1];
                let comparison = 0;
            switch(sortBy) {
                case 'number': comparison = parseInt(a[0].substring(1)) - parseInt(b[0].substring(1)); break;
                case 'name': comparison = aObj.name.localeCompare(bObj.name); break;
                case 'type': comparison = aObj.type.localeCompare(bObj.type); break;
                case 'magnitude': comparison = (aObj.magnitude || 99) - (bObj.magnitude || 99); break;
                case 'difficulty':
                    const diffOrder = { 'Very Easy': 1, 'Easy': 2, 'Moderate': 3, 'Hard': 4, 'Very Hard': 5};
                    comparison = (diffOrder[aObj.viewingDifficulty] || 5) - (diffOrder[bObj.viewingDifficulty] || 5);
                    break;
            }
                return sortOrder === 'asc' ? comparison : -comparison;
            });
            const tbody = document.getElementById('resultsBody');
            tbody.innerHTML = '';
            filtered.forEach(([key, obj]) => {
                const row = tbody.insertRow();
                row.innerHTML = `
                    <td>${key}</td>
                    <td>${obj.name}</td>
                    <td>${obj.type}</td>
                    <td>${obj.magnitude || ''}</td>
                    <td>${obj.viewingDifficulty || ''}</td>
                    <td>${obj.image ? `<a href="${obj.image}" target="_blank">View Image</a>` : ''}</td>
                `;
            });
            document.getElementById('status').textContent = `Showing ${filtered.length} objects`;
        }

        function sortTable(columnIndex) {
            const sortByOptions = ['number', 'name', 'type', 'magnitude', 'difficulty'];
            const sortBy = document.getElementById('sortBy');
            sortBy.value = sortByOptions[columnIndex] || 'number';
            const order = document.getElementById('sortOrder');
            order.value = order.value === 'asc' ? 'desc' : 'asc';
            filterObjects();
        }
    </script>
    <script>
        function toggleTheme() {
            const html = document.documentElement;
            const currentTheme = html.getAttribute('data-theme');
            const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
            html.setAttribute('data-theme', newTheme);
            document.getElementById('themeToggle').textContent = newTheme === 'dark' ? '☀️' : '🌙';
            localStorage.setItem('theme', newTheme);
        }
    
        // Load saved theme on page load
        document.addEventListener('DOMContentLoaded', () => {
            const savedTheme = localStorage.getItem('theme') || 'light';
            document.documentElement.setAttribute('data-theme', savedTheme);
            document.getElementById('themeToggle').textContent = savedTheme === 'dark' ? '☀️' : '🌙';
        });
    </script>

    
</body>
</html>
